name: Build DEB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: sudo apt update && sudo apt install -y make perl clang xz-utils

      - name: Install Theos
        run: git clone --recursive https://github.com/theos/theos.git $HOME/theos

      - name: Install iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Build
        run: |
          export THEOS=$HOME/theos
          make package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packages/*.deb
