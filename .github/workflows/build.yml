name: Build DEB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: sudo apt update && sudo apt install -y make perl clang

      - name: Install Theos
        run: git clone --recursive https://github.com/theos/theos.git $HOME/theos

      - name: Build
        env:
          THEOS: $HOME/theos
        run: make package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packages/*.deb
