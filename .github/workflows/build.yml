name: Build DEB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install deps
        run: sudo apt update && sudo apt install -y make perl clang lld git xz-utils

      - name: Install Theos
        run: git clone --recursive https://github.com/theos/theos.git $HOME/theos

      - name: Install SDKs
        run: |
          rm -rf $HOME/theos/sdks/*
          git clone https://github.com/theos/sdks.git /tmp/sdks
          cp -R /tmp/sdks/* $HOME/theos/sdks/

      - name: Build
        run: |
          export THEOS=$HOME/theos
          export PREFIX=/usr
          make package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packages/*.deb
